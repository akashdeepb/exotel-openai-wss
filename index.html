<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Config</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { background: #f5f7fa; }
        .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); border-radius: 10px; }
        .card-header { background: #fff; border-bottom: 1px solid #eee; font-weight: 600; border-radius: 10px 10px 0 0 !important; }
        textarea#systemInstructions { font-family: monospace; font-size: 13px; resize: vertical; }
        .badge-live { background: #22c55e; color: #fff; font-size: 11px; border-radius: 20px; padding: 2px 10px; }
        #status { min-height: 40px; }
        .range-val { font-weight: 600; color: #4f46e5; min-width: 50px; display: inline-block; text-align: right; }
    </style>
</head>
<body>
<div class="container py-4" style="max-width: 760px;">

    <div class="d-flex align-items-center mb-4 gap-3">
        <div>
            <h4 class="mb-0 fw-bold">Bot Configuration</h4>
            <small class="text-muted">Changes take effect on the next incoming call</small>
        </div>
    </div>

    <!-- Model & Voice -->
    <div class="card mb-3">
        <div class="card-header py-3">Model &amp; Voice</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Model</label>
                    <select class="form-select" id="model">
                        <option value="gpt-4o-realtime-preview">gpt-4o-realtime-preview</option>
                        <option value="gpt-4o-mini-realtime-preview">gpt-4o-mini-realtime-preview</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Voice</label>
                    <select class="form-select" id="voice">
                        <option value="alloy">Alloy</option>
                        <option value="ash">Ash</option>
                        <option value="ballad">Ballad</option>
                        <option value="coral">Coral</option>
                        <option value="echo">Echo</option>
                        <option value="sage">Sage</option>
                        <option value="shimmer">Shimmer</option>
                        <option value="verse">Verse</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- VAD Settings -->
    <div class="card mb-3">
        <div class="card-header py-3">Voice Activity Detection</div>
        <div class="card-body">
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label fw-semibold d-flex justify-content-between">
                        Silence Timeout
                        <span><span class="range-val" id="silenceTimeoutVal">500</span> ms</span>
                    </label>
                    <input type="range" class="form-range" id="silenceTimeoutMs" min="200" max="3000" step="50">
                    <div class="d-flex justify-content-between">
                        <small class="text-muted">200 ms (snappy)</small>
                        <small class="text-muted">3000 ms (relaxed)</small>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold d-flex justify-content-between">
                        VAD Sensitivity
                        <span><span class="range-val" id="vadThresholdVal">0.50</span></span>
                    </label>
                    <input type="range" class="form-range" id="vadThreshold" min="0.1" max="0.9" step="0.05">
                    <div class="d-flex justify-content-between">
                        <small class="text-muted">0.1 (very sensitive)</small>
                        <small class="text-muted">0.9 (loud only)</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- System Instructions -->
    <div class="card mb-4">
        <div class="card-header py-3">System Instructions</div>
        <div class="card-body">
            <textarea class="form-control" id="systemInstructions" rows="18"></textarea>
        </div>
    </div>

    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-primary px-4" id="saveBtn">Save</button>
        <button class="btn btn-outline-secondary px-4" id="resetBtn">Reset to Saved</button>
        <div id="status"></div>
    </div>

</div>

<script>
    let savedConfig = {};

    function loadConfig() {
        $.getJSON('/api/config', function (cfg) {
            savedConfig = cfg;
            applyToForm(cfg);
        }).fail(function () {
            showStatus('Failed to load config.', 'danger');
        });
    }

    function applyToForm(cfg) {
        $('#model').val(cfg.model);
        $('#voice').val(cfg.voice);
        $('#silenceTimeoutMs').val(cfg.silenceTimeoutMs);
        $('#silenceTimeoutVal').text(cfg.silenceTimeoutMs);
        $('#vadThreshold').val(cfg.vadThreshold);
        $('#vadThresholdVal').text(Number(cfg.vadThreshold).toFixed(2));
        $('#systemInstructions').val(cfg.systemInstructions);
    }

    function showStatus(msg, type) {
        $('#status').html(`<div class="alert alert-${type} py-2 mb-0">${msg}</div>`);
        setTimeout(() => $('#status').html(''), 3500);
    }

    $('#silenceTimeoutMs').on('input', function () {
        $('#silenceTimeoutVal').text($(this).val());
    });

    $('#vadThreshold').on('input', function () {
        $('#vadThresholdVal').text(Number($(this).val()).toFixed(2));
    });

    $('#saveBtn').on('click', function () {
        const payload = {
            model: $('#model').val(),
            voice: $('#voice').val(),
            silenceTimeoutMs: parseInt($('#silenceTimeoutMs').val()),
            vadThreshold: parseFloat($('#vadThreshold').val()),
            systemInstructions: $('#systemInstructions').val()
        };

        $('#saveBtn').prop('disabled', true).text('Saving…');

        $.ajax({
            type: 'POST',
            url: '/api/config',
            data: JSON.stringify(payload),
            contentType: 'application/json',
            success: function (cfg) {
                savedConfig = cfg;
                showStatus('Saved! Changes apply to the next call.', 'success');
            },
            error: function () {
                showStatus('Save failed.', 'danger');
            },
            complete: function () {
                $('#saveBtn').prop('disabled', false).text('Save');
            }
        });
    });

    $('#resetBtn').on('click', function () {
        applyToForm(savedConfig);
    });

    loadConfig();
</script>
</body>
</html>
